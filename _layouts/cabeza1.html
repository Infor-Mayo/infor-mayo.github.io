<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset='utf-8'>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    {% include head-custom.html %}
    {% seo %}
    <style>
      body {
        background-image: url("./assets/images/background.jpg");
        background-repeat: no-repeat;
        background-size: cover;
      }

      #carouselExampleControls {
        max-width: 400px;
        margin: 0 auto;
      }
    </style>
  </head>

  <body>

    <header>
      <div class="container">
        <div style="display: flex; align-items: center;">
          <a id="a-title" href="{{ '/' | relative_url }}">
            <img src="./assets/images/image.png" alt="Logo de la empresa" style="width: 60px;">
          </a>
          <div style="margin: auto; text-align: center;">
            <h1>{{ site.title | default: site.github.repository_name }}</h1>
            <h2>{{ site.description | default: site.github.project_tagline }}</h2>
            <h3>Tu eslogan aquí</h3>
          </div>
        </div>
        <nav style="display: flex; justify-content: center;">
          <ul style="display: flex; list-style: none; padding: 0;">
            <li style="margin-right: 1rem;"><a href="#">Inicio</a></li>
            <li style="margin-right: 1rem;"><a href="#">Acerca de</a></li>
            <li style="margin-right: 1rem;"><a href="#">Productos</a></li>
            <li><a href="#">Contacto</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <div class="container">
      <section id="main_content">
        <div id="carouselExampleControls" class="carousel slide" data-bs-ride="carousel">
          <div class="carousel-inner">
            <div class="carousel-item active">
              <img src="./assets/images/carousel-1.jpg" class="d-block w-100" alt="Carousel 1">
            </div>
            <div class="carousel-item">
              <img src="./assets/images/carousel-2.jpg" class="d-block w-100" alt="Carousel 2">
            </div>
            <div class="carousel-item">
              <img src="./assets/images/carousel-3.jpg" class="d-block w-100" alt="Carousel 3">
            </div>
          </div>
          <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleControls" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Anterior</span>
          </button>
          <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleControls" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Siguiente</span>
          </button>
        </div>
      </section>
    </div>

  </body>
</html>
