<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset='utf-8'>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    {% include head-custom.html %}
    {% seo %}
    <style>
      body {
        background-image: url("./assets/images/background.jpg");
        background-size: cover;
        background-position: center;
        transition: background-image 0.5s;
      }
      .container {
        background-color: rgba(255, 255, 255, 0.8);
        padding: 1rem;
        border-radius: 0.5rem;
      }
    </style>
  </head>

  <body>
    <header>
      <div class="container">
        <div style="display: flex; align-items: center;">
          <a id="a-title" href="{{ '/' | relative_url }}">
            <img src="./assets/images/image.png" alt="Logo de la empresa" style="width: 60px;">
          </a>
          <div style="margin: auto; text-align: center;">
            <h1>{{ site.title | default: site.github.repository_name }}</h1>
            <h2>{{ site.description | default: site.github.project_tagline }}</h2>
            <h3>Tu eslogan aquí</h3>
          </div>
        </div>
        <nav style="display: flex; justify-content: center;">
          <ul style="display: flex; list-style: none; padding: 0;">
            <li style="margin-right: 1rem;"><a href="#">Inicio</a></li>
            <li style="margin-right: 1rem;"><a href="#">Acerca de</a></li>
            <li style="margin-right: 1rem;"><a href="#">Productos</a></li>
            <li><a href="#">Contacto</a></li>
          </ul>
        </nav>
        <div style="display: flex; justify-content: center;">
          <button onclick="changeBackground()">Cambiar fondo</button>
        </div>
      </div>
    </header>

    <div class="container">
      {{ content }}
    </div>

    <script>
      const images = ['./assets/images/background.jpg', './assets/images/background2.jpg', './assets/images/background3.jpg'];
      let currentImageIndex = 0;

      function changeBackground() {
        currentImageIndex++;
        if (currentImageIndex === images.length) {
          currentImageIndex = 0;
        }
        document.body.style.backgroundImage = `url('${images[currentImageIndex]}')`;
      }
    </script>

    <script src="{{ '/assets/js/jquery.min.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/main.js?v=' | append: site.github.build_revision | relative_url }}"></script>
  </body>
</html>
