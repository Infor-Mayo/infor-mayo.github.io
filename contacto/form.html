<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Contacto</title>
</head>
<body>
	<h1>Contáctame</h1>
	<form>
		<label for="nombre">Nombre:</label>
		<input type="text" id="nombre" name="nombre" required>
		<br>
		<label for="asunto">Asunto:</label>
		<input type="text" id="asunto" name="asunto" required>
		<br>
		<label for="mensaje">Mensaje:</label>
		<textarea id="mensaje" name="mensaje" required></textarea>
		<br>
		<button type="button" onclick="enviarCorreo()">Enviar</button>
	</form>
	
	<script>
		function enviarCorreo() {
			var asunto = encodeURIComponent(document.getElementById("asunto").value);
			var mensaje = encodeURIComponent(document.getElementById("mensaje").value);
			var correo = "marioartola811@gmail.com";
			var enlace = "mailto:" + correo + "?subject=" + asunto + "&body=" + mensaje;
			window.open(enlace);
		}
	</script>
</body>
</html>
