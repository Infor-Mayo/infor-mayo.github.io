<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Contacto</title>
	<script>
		function actualizarTexto(mensaje) {
			document.getElementById("texto-contacto").textContent = mensaje;
		}
	</script>
</head>
<body>
	<h1><span id="texto-contacto">Correo electrónico</span></h1>
	<form method="post" action="./contacto/enviar.php" onsubmit="actualizarTexto(document.getElementById('mensaje').value)">
		<label for="nombre">Nombre:</label>
		<input type="text" id="nombre" name="nombre" required>
		<br>
		<label for="email">Correo electrónico:</label>
		<input type="email" id="email" name="email" required>
		<br>
		<label for="mensaje">Mensaje:</label>
		<textarea id="mensaje" name="mensaje" required></textarea>
		<br>
		<input type="submit" value="Enviar">
	</form>
</body>
</html>
